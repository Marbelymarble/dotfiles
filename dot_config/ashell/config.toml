log_level = "warn"
outputs = "All"
position = "Top"
app_launcher_cmd = "fuzzel"

enable_esc_key = true

[modules]
left = [ [ "appLauncher", "Updates", "Workspaces" , "MediaPlayer"] ]
center = [ "WindowTitle" ]
right = [ "SystemInfo", [  "Tray", "Clock", "Tempo", "Settings" ] ]

[updates]
check_cmd = "checkupdates; paru -Qua"
update_cmd = 'kitty -e bash -c "paru; echo Done - Press enter to exit; read" &'


[tempo]
clock_format = "%a %d %b %R"
weather_location = { City = "Eggolsheim" }
weather_indicator = "Icon"


[workspaces]
enable_workspace_filling = true

[[CustomModule]]
name = "appLauncher"
icon = "󱗼"
command = "fuzzel"

[window_title]
truncate_title_after_length = 100

[media_player]
max_title_length = 50

[settings]
lock_cmd = "playerctl --all-players pause; swaylock"
audio_sinks_more_cmd = "pavucontrol -t 3"
audio_sources_more_cmd = "pavucontrol -t 4"
wifi_more_cmd = "nm-connection-editor"
vpn_more_cmd = "nm-connection-editor"
bluetooth_more_cmd = "bluetui"
remove_airplane_btn = true

[appearance]
success_color = "#94768B"
text_color = "#c3c1c4"
scale_factor = 1.3


workspace_colors = [ "#63708B", "#6DACCD", "#9AA0A3" ]

[appearance.primary_color]
base = "#6DACCD"
text = "#120916"

[appearance.danger_color]
base = "#63708B"
weak = "#120916"

[appearance.background_color]
base = "#120916"
weak = "#94768B"
strong = "#120916"

[appearance.secondary_color]
base = "#120916"
strong = "#120916"
